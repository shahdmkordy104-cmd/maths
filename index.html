<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة صائد التفاح</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Prevent zooming and scrolling on mobile */
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 100%;
            max-height: 800px;
            background-color: #87CEEB; /* لون السماء */
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        @media (min-width: 601px) {
            #game-container {
                height: 90vh;
                border-radius: 15px;
            }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 10;
        }

        .stats-left {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stats-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .hearts {
            color: #ff3333;
            font-size: 1.5rem;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            transition: opacity 0.3s;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #ffd700;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            text-align: center;
        }

        p.desc {
            font-size: 1.2rem;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.6;
            max-width: 80%;
        }

        .rules span {
            display: block;
            margin: 5px 0;
            font-size: 1.1rem;
        }

        button {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: inherit;
            font-weight: bold;
            background-color: #ff5722;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 87, 34, 0.4);
            transition: transform 0.1s, background-color 0.2s;
            margin-top: 20px;
        }

        button:active {
            transform: scale(0.95);
        }

        button:hover {
            background-color: #e64a19;
        }

        #final-score {
            font-size: 2rem;
            color: #4CAF50;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- UI Layer (Score & Level) -->
    <div class="ui-layer">
        <div class="stats-left">
            <div>المستوى: <span id="level-ui">1</span></div>
            <div>النقاط: <span id="score-ui">0</span></div>
        </div>
        <div class="stats-right">
            <div class="hearts" id="hearts-ui">❤️❤️❤️</div>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="screen">
        <h1>صائد التفاح</h1>
        <div class="rules">
            <span>🍎 أحمر = +1 نقطة</span>
            <span>🌟 ذهبي = +5 نقاط</span>
            <span>💣 أسود = -2 نقطة</span>
        </div>
        <p class="desc"><br>حرك الطبق يميناً ويساراً لجمع التفاح.<br>لا تدع التفاح الجيد يسقط على الأرض!</p>
        <button onclick="startGame()">ابدأ اللعب</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen hidden">
        <h1>نهاية اللعبة</h1>
        <p class="desc">لقد خسرت كل محاولاتك!</p>
        <div id="final-score">النقاط: 0</div>
        <button onclick="startGame()">إعادة اللعب</button>
    </div>

    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const scoreUI = document.getElementById('score-ui');
    const levelUI = document.getElementById('level-ui');
    const heartsUI = document.getElementById('hearts-ui');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreUI = document.getElementById('final-score');

    // Game Variables
    let animationId;
    let spawnTimeoutId;
    let isPlaying = false;
    let score = 0;
    let level = 1;
    let lives = 3;
    let apples = [];
    
    // Base configuration
    const baseFallSpeed = 3;
    const baseSpawnRate = 1200; // ms
    let currentSpawnRate = baseSpawnRate;

    // Responsive Canvas dimensions
    function resizeCanvas() {
        const container = document.getElementById('game-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        
        // Reset basket Y position on resize
        if (basket) {
            basket.y = canvas.height - 60;
        }
    }
    window.addEventListener('resize', resizeCanvas);

    // Basket Object
    const basket = {
        width: 100,
        height: 30,
        x: 0,
        y: 0,
        color: '#8B4513',
        draw() {
            // رسم الطبق (شكل بيضاوي متقدم أو مستطيل منحني)
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.roundRect(this.x, this.y, this.width, this.height, [10, 10, 20, 20]);
            ctx.fill();
            
            // إضافة تفاصيل للطبق (إطار داخلي)
            ctx.fillStyle = '#A0522D';
            ctx.beginPath();
            ctx.roundRect(this.x + 5, this.y + 5, this.width - 10, this.height - 10, [5, 5, 10, 10]);
            ctx.fill();
        }
    };

    // Apple Class
    class Apple {
        constructor() {
            this.radius = 18;
            this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
            this.y = -this.radius;
            
            // تحديد نوع التفاحة عشوائياً
            const rand = Math.random();
            if (rand < 0.15) {
                // 15% تفاح ذهبي
                this.type = 'gold';
                this.color = '#FFD700';
            } else if (rand < 0.35) {
                // 20% تفاح أسود
                this.type = 'black';
                this.color = '#333333';
            } else {
                // 65% تفاح أحمر
                this.type = 'red';
                this.color = '#FF3333';
            }
            
            // سرعة السقوط تعتمد على المستوى الحالي
            this.speed = baseFallSpeed + (level * 0.5);
            // تغيير طفيف في السرعة لكل تفاحة
            this.speed += (Math.random() * 1) - 0.5;
        }

        draw() {
            // رسم التفاحة
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();

            // رسم اللمعة (للتفاح الذهبي والأحمر)
            if (this.type !== 'black') {
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath();
                ctx.ellipse(this.x - 6, this.y - 6, 4, 8, Math.PI / 4, 0, Math.PI * 2);
                ctx.fill();
            }

            // رسم الجذع (الفرع الصغير)
            ctx.strokeStyle = '#5C4033';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y - this.radius);
            ctx.lineTo(this.x + 3, this.y - this.radius - 8);
            ctx.stroke();

            // رسم الورقة الخضراء (إذا لم تكن سوداء)
            if (this.type !== 'black') {
                ctx.fillStyle = '#32CD32';
                ctx.beginPath();
                ctx.ellipse(this.x + 8, this.y - this.radius - 4, 4, 7, Math.PI / 3, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // شكل جمجمة أو علامة X للتفاح الأسود
                ctx.fillStyle = '#fff';
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('×', this.x, this.y);
            }
        }

        update() {
            this.y += this.speed;
            this.draw();
        }
    }

    // Input Handling (Mouse / Touch / Keyboard)
    let isDragging = false;

    // Mouse events
    canvas.addEventListener('mousedown', () => isDragging = true);
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', (e) => {
        if (!isPlaying) return;
        const rect = canvas.getBoundingClientRect();
        const root = document.documentElement;
        // حساب موقع الماوس بالنسبة للكانفاس
        let mouseX = e.clientX - rect.left - root.scrollLeft;
        setBasketPosition(mouseX);
    });

    // Touch events for Mobile
    canvas.addEventListener('touchstart', (e) => {
        // e.preventDefault();
        isDragging = true;
    }, {passive: false});
    window.addEventListener('touchend', () => isDragging = false);
    window.addEventListener('touchmove', (e) => {
        if (!isPlaying) return;
        // e.preventDefault(); // منع تمرير الشاشة
        const rect = canvas.getBoundingClientRect();
        let touchX = e.touches[0].clientX - rect.left;
        setBasketPosition(touchX);
    }, {passive: false});

    function setBasketPosition(x) {
        // نجعل مركز الطبق عند الماوس/الإصبع
        basket.x = x - (basket.width / 2);
        
        // منع الطبق من الخروج عن حدود الشاشة
        if (basket.x < 0) basket.x = 0;
        if (basket.x + basket.width > canvas.width) basket.x = canvas.width - basket.width;
    }

    // Spawn Apples iteratively
    function spawnApple() {
        if (!isPlaying) return;
        apples.push(new Apple());
        
        // جدولة التفاحة القادمة
        spawnTimeoutId = setTimeout(spawnApple, currentSpawnRate);
    }

    // Game Logic Update
    function updateGame() {
        if (!isPlaying) return;

        // تنظيف الشاشة (رسم خلفية، هنا نستعمل لون شفاف لعدم مسح الخلفية الأصلية إن وجدت، ولكن يفضل مسحها بالكامل)
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // رسم الطبق
        basket.draw();

        // تحديث ورسم التفاح
        for (let i = 0; i < apples.length; i++) {
            let apple = apples[i];
            apple.update();

            // التحقق من التصادم مع الطبق
            // نتحقق إذا كانت التفاحة ضمن إحداثيات الطبق (تلامس مستطيل)
            let inX = apple.x + apple.radius > basket.x && apple.x - apple.radius < basket.x + basket.width;
            let inY = apple.y + apple.radius > basket.y && apple.y - apple.radius < basket.y + basket.height;

            if (inX && inY) {
                // تم الإمساك بالتفاحة!
                if (apple.type === 'red') {
                    score += 1;
                } else if (apple.type === 'gold') {
                    score += 5;
                } else if (apple.type === 'black') {
                    score -= 2;
                    if (score < 0) score = 0; // لا نسمح بالنقاط السالبة
                }
                
                checkLevelUp();
                updateUI();
                
                // إزالة التفاحة
                apples.splice(i, 1);
                i--;
                continue;
            }

            // التحقق من سقوط التفاحة على الأرض
            if (apple.y - apple.radius > canvas.height) {
                if (apple.type === 'red' || apple.type === 'gold') {
                    // فقدان تفاحة جيدة يخصم محاولة
                    lives -= 1;
                    updateUI();
                    
                    if (lives <= 0) {
                        endGame();
                        return; // توقف اللعبة فوراً
                    }
                }
                // إزالة التفاحة بعد تجاوزها الشاشة
                apples.splice(i, 1);
                i--;
            }
        }

        animationId = requestAnimationFrame(updateGame);
    }

    function checkLevelUp() {
        // كل 15 نقطة نزيد المستوى
        const expectedLevel = Math.floor(score / 15) + 1;
        if (expectedLevel > level) {
            level = expectedLevel;
            // زيادة الصعوبة (تسريع نزول التفاح وتسريع معدل الظهور)
            currentSpawnRate = Math.max(400, baseSpawnRate - (level * 80)); 
            
            // تأثير بصري خفيف عند زيادة المستوى
            document.getElementById('game-container').style.boxShadow = "0 0 30px #FFD700";
            setTimeout(() => {
                document.getElementById('game-container').style.boxShadow = "0 10px 30px rgba(0,0,0,0.3)";
            }, 500);
        }
    }

    function updateUI() {
        scoreUI.innerText = score;
        levelUI.innerText = level;
        
        let heartsHTML = '';
        for(let i=0; i<lives; i++) heartsHTML += '❤️';
        for(let i=lives; i<3; i++) heartsHTML += '🖤'; // قلوب فارغة
        heartsUI.innerText = heartsHTML;
    }

    function startGame() {
        // Reset variables
        resizeCanvas();
        score = 0;
        level = 1;
        lives = 3;
        apples = [];
        currentSpawnRate = baseSpawnRate;
        basket.x = (canvas.width / 2) - (basket.width / 2);
        basket.y = canvas.height - 60;
        
        updateUI();
        
        // Hide screens
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        
        isPlaying = true;
        
        // Start loops
        spawnApple();
        updateGame();
    }

    function endGame() {
        isPlaying = false;
        cancelAnimationFrame(animationId);
        clearTimeout(spawnTimeoutId);
        
        finalScoreUI.innerText = `النقاط: ${score}`;
        gameOverScreen.classList.remove('hidden');
    }

    // Initial setup
    resizeCanvas();
</script>
</body>
</html>
